# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "iOS GitHub Auth Integration"
  slug: "ios-github-auth-integration"
  kind: specific
  tranche: "After PR #43 merges, implement real GitHub auth/session/repo-selection plumbing for the iOS app as one verified PR."
  status: active
  oracle:
    signal: "A signed-out simulator run can connect through the real GitHub auth boundary or controlled test doubles, store/load session state safely, fetch repositories through a GitHub service layer, select repos, relaunch with selections preserved, and pass unit/UI smoke checks."
    cadence: "after each Worker package and at final audit"
    final_proof: "Task receipts show PR #43 merged, main synced, implementation PR opened, unit tests passed, iOS UI smoke passed, build passed, and no secrets were introduced."
  intake:
    original_request: "Planning out extensively using GoBuddy Prep. Once that PR merges that is."
    interpreted_outcome: "Prepare a GoalBuddy board that will execute the next post-merge iOS PR: real GitHub auth, secure session storage, repo fetching, and repo selection persistence."
    input_shape: specific
    audience: "PRBar iOS users and the maintainer reviewing the next implementation PR."
    authority: approved
    proof_type: test
    completion_proof: "A draft PR after #43 merges that implements and verifies the real GitHub auth/session/repo-selection vertical slice."
    likely_misfire: "Stopping at another prototype/mock flow instead of establishing a secure, testable OAuth/session/API architecture."
    blind_spots_considered:
      - "OAuth app type, callback URL scheme, and whether device flow or ASWebAuthenticationSession is the right first implementation."
      - "Keychain storage and testability without real tokens in CI."
      - "GitHub API pagination, rate limits, scopes, private repo visibility, and failure states."
      - "Preserving privacy defaults: private repos excluded by default and hidden from share surfaces unless intentionally included."
      - "Keeping UI tests deterministic with fakes or launch-time dependency injection."
      - "Not expanding into PR/release data fetching before auth and repo selection are real."
    existing_plan_facts:
      - "PR #43 contains prototype GitHub connection state and repo-selection onboarding."
      - "This goal must wait until PR #43 merges to main."
      - "The preferred next PR is GitHub OAuth plus secure token/session storage, then repo API integration."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-github-auth-integration/"
    command: "npx goalbuddy board docs/goals/ios-github-auth-integration"

