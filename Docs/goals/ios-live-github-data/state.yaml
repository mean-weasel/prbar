version: 2

goal:
  title: "iOS Live GitHub Data"
  slug: "ios-live-github-data"
  kind: existing_plan
  tranche: "Replace the iOS preview app's dummy runtime data with an authenticated GitHub-backed data path while preserving deterministic sample providers for previews and CI."
  status: done
  oracle:
    signal: "A simulator or physical-device walkthrough plus automated tests showing signed-in GitHub data drives PRs, Releases, repo selection, and Share, while sample providers still power previews/CI."
    cadence: "after each Worker package and at final audit"
    final_proof: "Receipts for provider contracts, auth/session, repo selection, GitHub fetch/normalization, UI wiring, share output, and verification commands, followed by a final Judge/PM audit with full_outcome_complete: true."
  intake:
    original_request: "Make a detailed GoalBuddy plan for replacing dummy iOS preview data with real GitHub-backed data."
    interpreted_outcome: "PRBar iOS should move from dummy data to a live GitHub-backed app path without losing preview/CI determinism or privacy-safe defaults."
    input_shape: existing_plan
    audience: "PRBar iOS users and maintainers"
    authority: requested
    proof_type: demo
    completion_proof: "The iOS app can authenticate with GitHub, select repos, fetch and normalize real PR/release/tag data, render the existing PRs/Releases/Share surfaces from that data, and pass deterministic CI/previews using sample providers."
    likely_misfire: "Implementing only a nicer dummy-data abstraction or one live screen, while releases/share/repo selection still depend on hardcoded sample data."
    blind_spots_considered:
      - "GitHub OAuth/device flow scope and rate-limit behavior."
      - "Keychain token storage and logout/revocation behavior."
      - "Selected-repo privacy defaults and private repo share safety."
      - "GitHub pagination, tags without releases, release drafts/prereleases, renamed/deleted repos."
      - "Date/time-zone normalization for daily calendars and distributions."
      - "Offline, loading, empty, partial-failure, and unauthenticated states."
      - "CI and SwiftUI previews must not require real GitHub credentials."
      - "The first tranche should not create a public social backend."
    existing_plan_facts:
      - "Introduce a data-provider abstraction with sample and live implementations."
      - "Keep sample data for previews, preview app mode, and CI."
      - "Add Sign in with GitHub and Keychain token storage before live syncing."
      - "Add repo selection similar to the macOS menu bar app."
      - "Fetch PRs, GitHub releases, and tagged versions from selected repos."
      - "Normalize PR/release/tag data into daily buckets, repo distributions, calendars, and share summaries."
      - "Keep share generation local through native iOS share surfaces in the first tranche."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-live-github-data/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/prbar/docs/goals/ios-live-github-data"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Map the current iOS app data flow, dummy/sample data sources, GitHub-related code, repo-selection patterns, and verification commands without changing files."
    inputs:
      - "apple/"
      - "Sources/"
      - "scripts/"
      - ".github/workflows/"
      - "docs/"
      - "The current GoalBuddy charter and intake facts"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Do not start new product work."
      - "Prefer concrete file-path evidence over generic advice."
    expected_output:
      - "Current iOS data/source map with file paths."
      - "Where dummy/sample data enters each UI surface."
      - "Existing GitHub/auth/repo-selection reusable pieces."
      - "Verification commands for unit tests, simulator smoke, and physical preview."
      - "Risks or blockers that should shape Worker allowed_files."
    receipt:
      result: done
      summary: "Current iOS app already has model/provider seams, repo selection, Keychain storage, GitHub repository fetching, PR/release/tag activity fetching, and UI wiring for PRs/Releases/Share. The live-data blocker is auth: production PRBarApp injects GitHubDeviceFlowAuthService, but GitHubDeviceFlowAuthService.connect() still throws a placeholder before network device-code/token polling."
      evidence:
        - "apple/PRBar/PRBarApp.swift wires static providers only for --ui-testing; production injects KeychainGitHubSessionStore, GitHubRepositoryClient, GitHubActivityClient, and UserDefaultsRepositorySelectionStore."
        - "apple/PRBarShared/PRBarStore.swift drives repositories, pullRequests, releases, routeState, GitHub auth, repo loading, selected repo persistence, and activity refresh."
        - "apple/PRBarShared/GitHubActivity.swift implements GitHubActivityClient for merged PRs, releases, tags, and tag commit metadata behind GitHubActivityProviding."
        - "apple/PRBarShared/GitHubRepositories.swift implements GitHubRepositoryClient and repository selection persistence seams."
        - "apple/PRBarShared/GitHubAuth.swift implements KeychainGitHubSessionStore and request builders, but GitHubDeviceFlowAuthService.connect() is not wired to network polling."
        - "apple/PRBar/PRs/PRsView.swift, apple/PRBar/Releases/ReleasesView.swift, and apple/PRBar/Share/ShareView.swift read provider-backed PRBarStore state."
        - "apple/PRBar/More/RepositorySetupView.swift handles selected repo toggles and finish setup."
        - "apple/PRBarTests/GitHubActivityTests.swift and apple/PRBarTests/PRBarModelTests.swift cover provider mapping, repo privacy defaults, and store refresh behavior."
      verification_commands:
        - "./scripts/ios-test.sh"
        - "./scripts/ios-ui-smoke.sh"
        - "gh workflow run \"iOS Physical Preview\" --repo mean-weasel/prbar --ref <branch> -f smoke_profile=pr -f device_name=iPhone-preview"
      risks:
        - "Live GitHub sign-in needs a configured PRBAR_IOS_GITHUB_CLIENT_ID; CI must continue using static providers and fakes."
        - "Device flow requires polling states and user-code UX; current GitHubAuthServicing.connect() is synchronous, so the first safe slice should establish a deterministic polling boundary and tests without committing secrets."
        - "Private repo data is already excluded by default on fetched repos but sample data still includes private repos for share warning coverage."

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the live-data architecture and choose the first largest safe Worker slice."
    inputs:
      - "T001 receipt"
      - "goal.oracle"
      - "goal.intake.existing_plan_facts"
    constraints:
      - "Do not implement."
      - "Preserve previews/CI sample data."
      - "Reject any plan that requires real GitHub credentials in CI."
      - "Pick the largest safe useful first slice with explicit allowed_files, verification, and stop conditions."
    expected_output:
      - "Architecture decision: approved | revise | blocked."
      - "First Worker objective."
      - "allowed_files for the first Worker."
      - "verify commands."
      - "stop_if conditions."
      - "Any follow-up board task edits needed."
    receipt:
      result: done
      decision: "approved"
      full_outcome_complete: false
      rationale: "Provider contracts and sample/live data seams already exist from earlier iOS auth/data-sync work. The largest safe next slice is to replace the placeholder GitHubDeviceFlowAuthService.connect() with a tested device-flow polling implementation while preserving deterministic CI and sample providers."
      worker_task: "T004"
      allowed_files:
        - "apple/PRBarShared/GitHubAuth.swift"
        - "apple/PRBarTests/PRBarModelTests.swift"
        - "docs/goals/ios-live-github-data/state.yaml"
      verify:
        - "IOS_TEST_ONLY=PRBarTests ./scripts/ios-test.sh"
      stop_if:
        - "A GitHub client secret, real token, or user credential would be needed."
        - "GitHub auth UX needs asynchronous user-code presentation beyond the current service boundary."
        - "Need files outside allowed_files."
        - "Verification fails twice for the same reason."

  - id: T003
    type: worker
    assignee: Worker
    status: blocked
    reasoning_hint: medium
    objective: "Implement the data-provider contract and deterministic sample provider selected by Judge so views can depend on structured app data instead of ad hoc dummy constants."
    allowed_files:
