    receipt:
      result: done
      summary: "GitHubDeviceFlowAuthService now uses the injected transport to request a device code, poll for an OAuth token, fetch the signed-in GitHub user, save the session through the existing session store, and return a connected GitHubConnection. Pending device authorization is surfaced as GitHubAuthError.authorizationPending so the next UX slice can show the user code and continue polling without committing credentials or requiring network access in CI."
      changed_files:
        - "apple/PRBarShared/GitHubAuth.swift"
        - "apple/PRBarTests/PRBarModelTests.swift"
        - "docs/goals/ios-live-github-data/state.yaml"
      commands:
        - cmd: "git diff --check"
          status: pass
        - cmd: "IOS_TEST_ONLY=PRBarTests ./scripts/ios-test.sh"
          status: pass
          details: "34 tests passed."
      evidence:
        - "GitHubDeviceFlowRequest.user(token:) builds the authenticated /user request with GitHub API headers."
        - "GitHubOAuthConfiguration keeps a default maxTokenPollAttempts so existing callers remain source-compatible."
        - "PRBarModelTests covers the full fake device-code -> token -> user -> stored-session path."
        - "PRBarModelTests covers authorization_pending returning the decoded GitHubDeviceAuthorization for UI follow-up."

