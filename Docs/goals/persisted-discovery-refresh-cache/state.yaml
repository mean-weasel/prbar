version: 2

goal:
  title: "Persisted Discovery Refresh Cache"
  slug: "persisted-discovery-refresh-cache"
  kind: specific
  tranche: "Persist safe GitHub discovery state so restarted refresh can avoid foreground discovery requests and use the persisted incremental PR cache path."
  status: done
  oracle:
    signal: "Fixture tests and benchmark evidence prove restarted refresh with compatible persisted discovery avoids foreground discovery requests while preserving safe fallback behavior."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final Judge or PM audit cites passing tests, refreshed benchmark/report output with restarted persisted-discovery request count, correctness coverage for invalidation/fallback, and live timing smoke result or skip reason."
  intake:
    original_request: "Use GoalBuddy goal prep to create measurable acceptance criteria for another round of refresh optimization."
    interpreted_outcome: "After app/provider restart, PR Menu Bar refresh should avoid foreground GitHub discovery when a compatible persisted discovery snapshot exists, ideally reducing the restarted refresh path from 4 foreground requests to 1."
    input_shape: specific
    audience: "PR Menu Bar maintainer and GitHub-backed app users"
    authority: approved
    proof_type: metric
    completion_proof: "Deterministic benchmark and tests show compatible restarted refresh uses persisted discovery plus persisted PR cache safely, with foreground request count at the accepted target."
    likely_misfire: "Persisting discovery data but still synchronously re-pulling /user/repos, /user, and /user/orgs on manual refresh, so the UI click remains slow after restart."
    blind_spots_considered:
      - "ETag and TTL behavior for discovery revalidation."
      - "Repository permissions, org membership, and token/user changes."
      - "Interaction between persisted discovery compatibility and persisted merged-PR cache compatibility."
      - "Foreground versus background request accounting in the benchmark."
      - "Live GitHub latency may differ from fixture request-count wins."
    existing_plan_facts:
      - "Previous tranche persisted the merged-PR incremental cache and proved restarted GraphQL search shrank from roughly 7 days to 35 minutes."
      - "Current fixture benchmark still shows persisted PR-cache restart performing 4 foreground requests because discovery is repeated."
      - "Desired next target is persisted discovery cache plus safe invalidation/revalidation."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/persisted-discovery-refresh-cache/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/prbar/Docs/goals/persisted-discovery-refresh-cache"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: low
    objective: "Map current GitHub discovery caching, persistence options, benchmark request accounting, and safety requirements for persisted discovery refresh."
    inputs:
      - "Sources/Models/GitHubPRActivityProvider*.swift"
      - "Sources/Models/GitHubRepository.swift"
      - "Sources/Models/GitHubAccount.swift"
      - "Sources/Models/GitHubMergedPullRequestCacheStore.swift"
      - "Sources/Models/PRActivityProviderFactory.swift"
      - "Tests/PRMenuBarTests/GitHubPRActivityProvider*Tests.swift"
      - "Tests/PRMenuBarTests/RefreshBenchmarkTests.swift"
      - "scripts/refresh-benchmark.sh"
      - "Docs/goals/persisted-incremental-refresh-cache/state.yaml"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Prefer concrete file-path evidence."
      - "Distinguish foreground refresh requests from optional background revalidation."
      - "Identify exact cache scope and invalidation/fallback triggers."
    expected_output:
      - "Current discovery call graph and in-memory cache shape."
      - "Persistence design options and safest store scope."
      - "Benchmark acceptance target, including whether 1 foreground request is feasible."
      - "Correctness risks and fallback triggers."
      - "Candidate Worker slice with likely allowed files and verification commands."
    receipt:
      result: done
      note: "notes/T001-discovery-cache-scout.md"
      summary: "Mapped the discovery call graph, in-memory discovery/ETag caches, persistence gap, feasible 1-request restarted path, fallback risks, and a largest safe Worker slice for persisted discovery refresh."
      evidence:
        - "Sources/Models/GitHubPRActivityProvider.swift"
        - "Sources/Models/GitHubPRActivityProvider+Discovery.swift"
        - "Sources/Models/GitHubPRActivityProvider+ConditionalRequests.swift"
        - "Sources/Models/GitHubMergedPullRequestCacheStore.swift"
        - "Tests/PRMenuBarTests/GitHubPRActivityProviderTests.swift"
        - "Tests/PRMenuBarTests/GitHubPRActivityProviderIncrementalTests.swift"
        - "Tests/PRMenuBarTests/RefreshBenchmarkTests.swift"
      spawned_tasks:
