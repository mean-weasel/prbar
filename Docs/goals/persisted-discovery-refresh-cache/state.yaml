    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the largest safe implementation slice for persisted discovery refresh based on Scout evidence."
    inputs:
      - "T001 receipt."
      - "Goal oracle and measurable acceptance criteria."
      - "Current dirty diff."
    constraints:
      - "Do not implement."
      - "Reject a slice that cannot prove restarted foreground request-count behavior."
      - "Reject a slice that reuses stale or incompatible discovery state unsafely."
      - "Require allowed_files, verify commands, and stop conditions."
    expected_output:
      - "Decision."
      - "Exact Worker objective."
      - "allowed_files."
      - "verify."
      - "stop_if."
      - "Deferred or blocked work."
    receipt:
      result: done
      decision: "approved"
      full_outcome_complete: false
      rationale: "Scout showed a single vertical slice can safely persist discovery snapshots, restore them before foreground REST discovery, preserve stale conditional revalidation, and prove the restarted path by benchmark request count. The slice includes benchmark coverage so T004 should only run if benchmark work needs follow-up."
      worker_task: T003
      allowed_files:
        - "Sources/Models/GitHubPRActivityProvider.swift"
        - "Sources/Models/GitHubPRActivityProvider+ConditionalRequests.swift"
        - "Sources/Models/GitHubDiscoveryCacheStore.swift"
        - "Sources/Models/GitHubRepository.swift"
        - "Sources/Models/GitHubAccount.swift"
        - "Sources/Models/PRActivityProviderFactory.swift"
        - "Tests/PRMenuBarTests/GitHubDiscoveryCacheStoreTests.swift"
