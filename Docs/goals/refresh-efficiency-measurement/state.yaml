      evidence:
        - "T004 added provider-level metrics and `make refresh-benchmark`."
        - "T006 added stable PR ids, incremental merged-PR cache, dedupe, full-refresh fallbacks, and failed-refresh watermark protection."
        - "T007 added ETag validators, response metadata, 304 handling, and conditional-request benchmark metrics."
        - "T008 deferred async/await with evidence because it does not currently provide a measurable refresh-efficiency win."
        - "T010 report: Docs/goals/refresh-efficiency-measurement/notes/T010-final-report.md"
      verification:
