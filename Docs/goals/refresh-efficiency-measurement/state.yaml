version: 2

goal:
  title: "Refresh Efficiency Measurement"
  slug: "refresh-efficiency-measurement"
  kind: existing_plan
  tranche: "Instrument, optimize, and verify PR Menu Bar refresh efficiency across the known follow-up areas."
  status: done
  oracle:
    signal: "Before/after refresh phase timings and GitHub request counts show measurable improvement without data freshness regressions."
    cadence: "after each Worker package and at final audit"
    final_proof: "A benchmark/report receipt plus passing format, file-size, and test commands."
  intake:
    original_request: "make a detailed plan using goalbuddy:goal-prep to address all of these measurably"
    interpreted_outcome: "Prepare a GoalBuddy board that drives measurable refresh-efficiency improvements end to end."
    input_shape: existing_plan
    audience: "PR Menu Bar maintainer and users"
    authority: requested
    proof_type: metric
    completion_proof: "Final audit maps receipts to measured refresh latency/request-count improvements and passing verification."
    likely_misfire: "Ship a plausible optimization without timing evidence, request-count proof, or freshness guarantees."
    blind_spots_considered:
      - "Live GitHub credentials may be unavailable in automation."
      - "Repository/org topology can change while cached."
      - "Incremental refresh can miss data when chart windows or filters change."
      - "Conditional requests can silently fall back to full payloads if ETag state is mishandled."
      - "Async transport migration can change error propagation, ordering, and UI refresh state semantics."
    existing_plan_facts:
      - "Add lightweight timing logs around refresh phases."
      - "Make PR search incremental."
      - "Use GitHub conditional requests."
      - "Move transport to async/await."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/refresh-efficiency-measurement/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/prbar/.worktrees/investigate-refresh-efficiency/docs/goals/refresh-efficiency-measurement"

active_task: null

tasks:
  - id: T001
    type: pm
    assignee: PM
    status: done
    reasoning_hint: default
    objective: "Populate the detailed measurable refresh-efficiency task board."
    inputs:
      - "User-provided follow-up list"
      - "Existing optimization context from the current thread"
    constraints:
      - "Edit only GoalBuddy control files."
      - "Do not inspect or modify implementation files during goal-prep."
    expected_output:
      - "Detailed role-tagged board"
      - "Oracle and verification steps"
    receipt:
      result: done
      summary: "Created the GoalBuddy charter and detailed board for measurable refresh-efficiency work."
      changed_files:
        - "docs/goals/refresh-efficiency-measurement/goal.md"
        - "docs/goals/refresh-efficiency-measurement/state.yaml"
      evidence:
        - "GoalBuddy update check: current_version 0.3.7, update_available false"
        - "Local board registered at http://goalbuddy.localhost:41737/refresh-efficiency-measurement/"

  - id: T002
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: low
    objective: "Map the current refresh execution path and define exact baseline measurements for phase timing and GitHub request counts."
    inputs:
      - "Sources/App"
      - "Sources/Models"
      - "Tests/PRMenuBarTests"
      - "scripts"
      - "Makefile"
    constraints:
      - "Read-only."
      - "Do not modify implementation or test files."
      - "Prefer concrete file-path evidence and exact refresh phases over generic advice."
      - "Identify whether live GitHub credentials are available only as optional evidence; do not require them."
    expected_output:
      - "Refresh call graph from UI click/timer to GitHub transport."
      - "List of phase boundaries to time, including discovery, user/org lookup, GraphQL search, decode, bucketing, and UI state update where observable."
      - "Request-count baseline design for cold refresh and repeated manual refresh."
      - "Recommended benchmark harness shape using fixtures when live GitHub credentials are absent."
      - "Risks and stop conditions for incremental search, conditional requests, and async migration."
    receipt:
      result: done
      note: "notes/T002-refresh-path-and-measurement.md"
      summary: "Mapped manual/scheduled refresh from SwiftUI through provider transport, identified timing boundaries, request-count formulas, fixture-backed benchmark shape, and risks for incremental search, conditional requests, and async migration."
      evidence:
        - "Sources/App/PRMenuBarApp.swift:38"
        - "Sources/App/PRMenuBarApp.swift:68"
        - "Sources/Models/PRActivityRefresher.swift:6"
        - "Sources/Models/GitHubPRActivityProvider.swift:36"
        - "Sources/Models/GitHubPRActivityProvider.swift:59"
        - "Sources/Models/GitHubPRActivityProvider.swift:142"
        - "Sources/Models/GitHubPRActivityProvider.swift:186"
        - "Sources/Models/URLSessionGitHubAPITransport.swift:9"
        - "Tests/PRMenuBarTests/GitHubPRActivityProviderTests.swift:133"
      spawned_tasks: []

  - id: T003
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the measurement plan and choose the first safe Worker package for observability."
    inputs:
      - "T002 receipt"
      - "docs/goals/refresh-efficiency-measurement/notes/T002-refresh-path-and-measurement.md"
      - "Current dirty diff"
      - "Goal oracle"
    constraints:
      - "Read-only."
      - "Do not approve implementation without a measurable before/after path."
      - "Reject plans that require live GitHub credentials for automated verification."
    expected_output:
      - "Decision: approved | revise | blocked"
      - "Exact Worker objective for instrumentation and benchmark/reporting."
      - "allowed_files for T004"
      - "verify commands for T004"
      - "stop_if conditions for T004"
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      rationale: "Scout mapped concrete refresh phases and request-count formulas. The next largest safe useful slice is observability plus a fixture-backed benchmark because it creates the oracle needed for later incremental search, conditional requests, and async decisions."
      worker_task: T004
      allowed_files:
        - "Sources/Models/**"
        - "Tests/PRMenuBarTests/**"
        - "scripts/**"
        - "Makefile"
        - "Docs/**"
      verify:
        - "./scripts/format-check.sh"
        - "./scripts/file-size-check.sh"
        - "make test"
        - "make refresh-benchmark"
      stop_if:
        - "Instrumentation requires tokens, live GitHub credentials, or persisted secrets."
        - "Benchmark cannot run with deterministic fixtures."
        - "Metrics expose token values, full GraphQL queries, or unsanitized owner names."
        - "Need files outside allowed_files."
        - "Verification fails twice for the same reason."
      notes:
        - "Do not include UI timing unless it can be captured without broad SwiftUI lifecycle changes."
        - "The first report should include cold refresh, cache-hit repeated refresh, and cache-expired refresh scenarios."

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Implement lightweight provider refresh phase timing/request-count observability and a repeatable fixture-backed benchmark report for cold, cache-hit, and cache-expired refreshes."
    allowed_files:
      - "Sources/Models/**"
      - "Tests/PRMenuBarTests/**"
      - "scripts/**"
      - "Makefile"
      - "Docs/**"
    verify:
      - "./scripts/format-check.sh"
      - "./scripts/file-size-check.sh"
      - "make test"
      - "make refresh-benchmark"
    stop_if:
      - "Need to store tokens or secrets."
      - "Need files outside allowed_files."
      - "Cannot produce fixture-backed timing/request-count output."
      - "Metrics expose token values, full GraphQL query text, or unsanitized owner names."
      - "Verification fails twice for the same reason."
    receipt:
      result: done
      changed_files:
        - "Makefile"
        - "Sources/Models/GitHubPRActivityProvider.swift"
        - "Sources/Models/GitHubPRActivityProvider+Metrics.swift"
        - "Sources/Models/RefreshMetrics.swift"
        - "Tests/PRMenuBarTests/GitHubPRActivityProviderTestSupport.swift"
        - "Tests/PRMenuBarTests/RefreshBenchmarkTests.swift"
        - "scripts/refresh-benchmark.sh"
      commands:
        - cmd: "./scripts/format-check.sh"
          status: pass
        - cmd: "./scripts/file-size-check.sh"
          status: pass
        - cmd: "make refresh-benchmark"
          status: pass
        - cmd: "make test"
          status: pass
      summary: "Added provider-level refresh metrics recording, moved fixture transport to test support, added a fixture-backed RefreshBenchmarkTests suite, and exposed `make refresh-benchmark` to emit `build/refresh-benchmark.json`."
      measurement:
        report: "build/refresh-benchmark.json"
        scenarios:
          - name: "cold_refresh"
            request_count: 4
            requests_by_path:
              "/user/repos": 1
              "/user": 1
              "/user/orgs": 1
              "/graphql": 1
          - name: "cache_hit_refresh"
            request_count: 1
            requests_by_path:
              "/graphql": 1
          - name: "cache_expired_refresh"
            request_count: 4
            requests_by_path:
              "/user/repos": 1
              "/user": 1
              "/user/orgs": 1
              "/graphql": 1
      verification_summary: "Full suite executed 70 tests with 0 failures; benchmark selected test executed 1 test with 0 failures and emitted JSON report."

  - id: T005
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review observability evidence and approve the largest safe incremental PR-search implementation slice."
    inputs:
      - "T004 receipt"
      - "Benchmark/report output"
      - "Current dirty diff"
    constraints:
      - "Read-only."
      - "Require freshness invariants for window changes, failed refreshes, and repository inclusion settings."
      - "Prefer a coherent slice over helper-only changes."
    expected_output:
      - "Decision: approved | revise | blocked"
      - "Exact incremental-search Worker objective"
      - "allowed_files"
      - "verify commands"
      - "stop_if conditions"
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      rationale: "T004 produced the required fixture-backed oracle for request counts and provider phase timings. The current model still lacks a stable merged-PR identity, so the next safe coherent slice must add identity, incremental cache state, and freshness fallbacks together instead of attempting range narrowing alone."
      worker_task: T006
      allowed_files:
        - "Sources/Models/**"
        - "Sources/App/**"
        - "Tests/PRMenuBarTests/**"
        - "scripts/**"
        - "Docs/**"
      verify:
        - "./scripts/format-check.sh"
        - "./scripts/file-size-check.sh"
        - "make test"
        - "make refresh-benchmark"
      stop_if:
        - "Stable PR identity cannot be decoded from GraphQL fixtures and live-compatible fields."
        - "Incremental state can miss PRs when the requested display window expands earlier than cached data."
        - "A failed incremental refresh mutates the last successful cache watermark."
        - "Repository discovery changes cannot trigger a full merged-PR recompute."
        - "Benchmarks cannot prove a narrowed repeated-refresh search range without live credentials."
        - "Need files outside allowed_files."
        - "Verification fails twice for the same reason."
      required_freshness_invariants:
        - "Use full merged-PR recompute when there is no successful merged-PR cache."
        - "Use full merged-PR recompute when discovery cache misses or repository/owner inclusion changes."
        - "Use full merged-PR recompute when the requested chart window starts before the cached range."
        - "Only advance the incremental watermark after all owner searches complete successfully."
        - "Deduplicate cached and newly fetched PRs by stable GraphQL PR id before bucketing."
      measurement_requirements:
        - "Benchmark report keeps request-count tables from T004."
        - "Benchmark report adds GraphQL search range metadata for the repeated refresh."
        - "Repeated cache-hit refresh should issue only GraphQL requests and search from the previous successful watermark to the new refresh time."

  - id: T006
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Implement incremental merged-PR search for repeated refreshes while preserving full recompute behavior when settings, windows, or cache state require it."
    allowed_files:
      - "Sources/Models/**"
      - "Sources/App/**"
      - "Tests/PRMenuBarTests/**"
      - "scripts/**"
      - "Docs/**"
    verify:
      - "./scripts/format-check.sh"
      - "./scripts/file-size-check.sh"
      - "make test"
      - "Run the refresh benchmark/report and compare request counts, searched time range, and phase timings before vs after T006."
    stop_if:
      - "Incremental state can miss PRs merged inside the selected display window."
      - "Full refresh fallback semantics are ambiguous."
      - "Need files outside allowed_files."
      - "Verification fails twice for the same reason."
    receipt:
      result: done
      changed_files:
        - "Sources/Models/GitHubGraphQLSearch.swift"
        - "Sources/Models/GitHubMergedPullRequest.swift"
        - "Sources/Models/GitHubPRActivityProvider.swift"
        - "Sources/Models/GitHubPRActivityProvider+IncrementalSearch.swift"
        - "Tests/PRMenuBarTests/GitHubGraphQLSearchTests.swift"
        - "Tests/PRMenuBarTests/GitHubPRActivityProviderIncrementalTests.swift"
        - "Tests/PRMenuBarTests/GitHubPRActivityProviderTestSupport.swift"
        - "Tests/PRMenuBarTests/GitHubPRActivityProviderTests.swift"
        - "Tests/PRMenuBarTests/RefreshBenchmarkTests.swift"
      commands:
        - cmd: "./scripts/format-check.sh"
          status: pass
        - cmd: "./scripts/file-size-check.sh"
          status: pass
        - cmd: "make test"
          status: pass
        - cmd: "make refresh-benchmark"
          status: pass
      summary: "Added stable GraphQL PR identity, merged-PR incremental cache state, full-refresh fallbacks for cache misses/window expansion/discovery changes, and failed-refresh watermark preservation. Updated benchmark metadata to prove repeated refreshes search only the new time range."
      measurement:
        report: "build/refresh-benchmark.json"
        scenarios:
          - name: "cold_refresh"
            request_count: 4
            graphql_mode: "full"
            graphql_since: "2026-04-25T18:00:00Z"
            graphql_until: "2026-05-02T18:00:00Z"
            provider_load_ms: 3.049
          - name: "cache_hit_refresh"
            request_count: 1
            graphql_mode: "incremental"
            graphql_since: "2026-05-02T18:00:00Z"
            graphql_until: "2026-05-02T18:05:00Z"
            provider_load_ms: 2.917
          - name: "cache_expired_refresh"
            request_count: 4
            graphql_mode: "full"
            graphql_since: "2026-04-25T18:16:00Z"
            graphql_until: "2026-05-02T18:16:00Z"
            provider_load_ms: 2.968
      freshness_invariants:
        - "No merged-PR cache uses full recompute."
        - "Discovery cache miss or repository/owner inclusion change uses full recompute."
        - "Requested chart window starting before cached range uses full recompute."
        - "Incremental cache watermark advances only after owner searches complete successfully."
        - "Cached and newly fetched PRs deduplicate by stable GraphQL PR id before bucketing."
      verification_summary: "Full suite executed 73 tests with 0 failures; benchmark selected test executed 1 test with 0 failures and emitted JSON report with incremental range metadata."

  - id: T007
