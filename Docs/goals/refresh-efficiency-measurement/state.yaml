      - "Reject completion if required Worker work is still queued, active, or unblocked."
      - "Reject completion if data freshness or settings preservation is unproven."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "Measured improvement summary"
