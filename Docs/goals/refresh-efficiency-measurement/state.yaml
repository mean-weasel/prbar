      - "Verification fails twice for the same reason."
    receipt:
      result: done
      changed_files:
        - "Sources/Models/GitHubAPIRequest.swift"
        - "Sources/Models/GitHubPRActivityProvider.swift"
        - "Sources/Models/GitHubPRActivityProvider+ConditionalRequests.swift"
        - "Sources/Models/URLSessionGitHubAPITransport.swift"
        - "Tests/PRMenuBarTests/GitHubAPIRequestTests.swift"
        - "Tests/PRMenuBarTests/GitHubPRActivityProviderTests.swift"
        - "Tests/PRMenuBarTests/GitHubPRActivityProviderTestSupport.swift"
        - "Tests/PRMenuBarTests/RefreshBenchmarkTests.swift"
        - "Tests/PRMenuBarTests/URLSessionGitHubAPITransportTests.swift"
      commands:
        - cmd: "./scripts/format-check.sh"
          status: pass
        - cmd: "./scripts/file-size-check.sh"
          status: pass
        - cmd: "make refresh-benchmark"
          status: pass
        - cmd: "make test"
          status: pass
