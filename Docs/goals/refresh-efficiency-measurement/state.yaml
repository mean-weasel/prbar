        scenarios:
          - name: "cold_refresh"
            request_count: 4
            conditional_uncached_count: 3
            conditional_not_modified_count: 0
            provider_load_ms: 3.118
          - name: "cache_hit_refresh"
            request_count: 1
            conditional_uncached_count: 0
            conditional_not_modified_count: 0
            provider_load_ms: 2.862
          - name: "cache_expired_refresh"
            request_count: 4
            conditional_uncached_count: 0
            conditional_not_modified_count: 3
            conditional_paths:
              - "/user/repos"
              - "/user"
              - "/user/orgs"
            provider_load_ms: 2.942
      verification_summary: "Full suite executed 77 tests with 0 failures; benchmark selected test executed 1 test with 0 failures and emitted JSON report with three fixture-backed 304/not-modified discovery hits."

  - id: T008
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Decide whether async/await transport migration is now safe and measurably useful, or should be deferred with evidence."
    inputs:
      - "T004, T006, and T007 receipts"
      - "Benchmark/report output"
      - "Current transport tests"
    constraints:
      - "Read-only."
      - "Approve async migration only if it improves maintainability or unlocks measurable parallelism without broad app rewrites."
      - "A deferral is acceptable only with evidence and a concrete future trigger."
    expected_output:
      - "Decision: implement | defer | revise"
      - "If implement: exact Worker objective, allowed_files, verify, stop_if"
      - "If defer: measurable rationale and future trigger"
    receipt:
      result: done
      decision: defer
      full_outcome_complete: false
      rationale: "Async/await migration is not the next measurable refresh-efficiency slice. Manual/scheduled refreshes already execute off the main thread, and the benchmark now shows the request-path wins come from incremental GraphQL ranges and conditional discovery reuse. Migrating the provider and refresher protocols would touch broad app/test plumbing without fixture-backed proof of lower request count or lower latency."
      evidence:
        - "Sources/App/PRMenuBarApp.swift:75 uses DispatchQueue.global(qos: .userInitiated) for refresh work."
        - "Sources/Models/PRActivityProvider.swift:3 exposes a synchronous provider interface used by static, JSON, file, and GitHub providers."
        - "build/refresh-benchmark.json shows cache_hit_refresh request_count 1 with GraphQL mode incremental."
        - "build/refresh-benchmark.json shows cache_expired_refresh conditional_not_modified_count 3 for discovery endpoints."
      future_trigger: "Revisit async/await when live metrics show multi-owner GraphQL fanout, paginated GraphQL searches, or cancellation/backpressure dominates refresh latency; require a before/after benchmark that proves parallel owner/page work or structured cancellation improves user-visible refresh time."

  - id: T009
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Migrate the GitHub transport/provider refresh path to async/await only if T008 approves the slice; otherwise mark blocked with the Judge deferral receipt."
    allowed_files:
      - "Sources/App/**"
      - "Sources/Models/**"
      - "Tests/PRMenuBarTests/**"
      - "scripts/**"
      - "Docs/**"
    verify:
      - "./scripts/format-check.sh"
      - "./scripts/file-size-check.sh"
      - "make test"
      - "Run the refresh benchmark/report and compare latency, request counts, and error propagation against prior receipts."
    stop_if:
      - "T008 does not explicitly approve implementation."
      - "Migration requires broad UI lifecycle rewrites beyond refresh handling."
      - "Error propagation or cancellation semantics become ambiguous."
      - "Need files outside allowed_files."
      - "Verification fails twice for the same reason."
    receipt:
      result: done
      changed_files:
        - "Docs/goals/refresh-efficiency-measurement/state.yaml"
      commands:
        - cmd: "T008 judge decision"
          status: pass
      summary: "No async/await implementation was performed because T008 explicitly deferred the migration. The worker stop condition is satisfied by the Judge deferral receipt."
      reason: "Current evidence does not justify broad refresh protocol plumbing."
      next_trigger: "Implement only after a future Judge receipt approves async migration from live multi-owner/page latency or cancellation evidence."

  - id: T010
    type: pm
    assignee: PM
    status: done
    reasoning_hint: medium
    objective: "Prepare the final measurable refresh-efficiency report from receipts and benchmark outputs."
    inputs:
