    receipt:
      result: done
      summary: "Mapped the production-device surface. The production app target already exists as PRBar/com.neonwatty.PRBar.ios and iPhone-prod is visible to CoreDevice/Xcode on this Mac. Current automation is still preview-shaped: workflows use PRBarPreview, preview bundle id, preview runner naming, and scripts default to preview names; ios-preview-install.sh also hardcodes PRBarPreview.app, so env overrides alone cannot safely install PRBar. GitHub Actions currently exposes one repo runner named prbar-iphone-preview with labels self-hosted/macOS/ARM64/prbar-ios/iphone-preview, so the first production workflow can likely reuse that Mac runner while explicitly selecting device_name=iPhone-prod, but a dedicated iphone-prod label/runner would be cleaner later."
      evidence:
        - ".github/workflows/ios-preview-install.yml:20-31 names Build and Install Preview App, uses runner label iphone-preview, sets IOS_SCHEME=PRBarPreview, and expects com.neonwatty.PRBar.ios.preview."
        - ".github/workflows/ios-physical-preview.yml:24-40 uses runner label iphone-preview, PRBarPreview scheme/test target, preview bundle id, and preview concurrency group."
        - "scripts/ios-preview-install.sh:7-12 defaults to PRBarPreview/iPhone-preview/com.neonwatty.PRBar.ios.preview."
        - "scripts/ios-preview-install.sh:36 hardcodes app_path to PRBarPreview.app, which prevents safe production use through environment overrides alone."
        - "scripts/ios-preview-device-smoke.sh:7-14 defaults to PRBarPreview, PRBarPreviewUITests, iPhone-preview, and PreviewDeviceSmokeResults.xcresult."
        - "scripts/ios-resolve-preview-device.sh:7-10 defaults to PRBarPreview and iPhone-preview but can resolve any IOS_DEVICE_NAME/IOS_SCHEME override."
        - "scripts/ios-list-devices.sh output shows iPhone-prod available via CoreDevice as D7045658-5C05-5166-B20F-1E01DEC05DB1, model iPhone 16e."
        - "scripts/ios-list-devices.sh output shows Xcode destination for iPhone-prod as 00008140-001055D83E87001C."
        - "gh api repos/mean-weasel/prbar/actions/runners reported only prbar-iphone-preview online, labels self-hosted/macOS/ARM64/prbar-ios/iphone-preview."
        - "apple/project.yml:11-24 defines production target PRBar with PRODUCT_BUNDLE_IDENTIFIER=com.neonwatty.PRBar.ios and preview target PRBarPreview separately."
        - "apple/project.yml:63-78 defines PRBarUITests against PRBar; apple/project.yml:78-94 defines PRBarPreviewUITests against PRBarPreview."
        - "apple/PRBar/Info.plist:21-22 reads PRBarGitHubOAuthClientID from PRBAR_IOS_GITHUB_CLIENT_ID; apple/PRBarPreview-Info.plist does not include that key in the generated file shown."
        - "apple/PRBar.xcodeproj/project.pbxproj:701-718 and 721-739 confirm PRBar app build settings use PRODUCT_BUNDLE_IDENTIFIER=com.neonwatty.PRBar.ios and PRODUCT_NAME=PRBar."
      recommendation: "Implement an explicit production workflow/channel rather than mutating preview workflows in place. Prefer shared scripts with parameterized scheme, product name, bundle id, device role, result bundle, and resolver text; preserve preview wrappers for compatibility. First production run should default device_name=iPhone-prod, scheme PRBar, UI target PRBarUITests, bundle id com.neonwatty.PRBar.ios, and concurrency group ios-production-device. Reuse runs-on labels [self-hosted, macOS, prbar-ios, iphone-preview] initially because that is the only online repo runner, while making device selection explicit and documenting that a future dedicated iphone-prod label would reduce operator risk."
      decision_points:
