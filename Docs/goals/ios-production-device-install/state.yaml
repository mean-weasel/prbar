        - "If GitHub sign-in is exercised on production, PRBAR_IOS_GITHUB_CLIENT_ID must be supplied to the production build through build settings or environment; otherwise the app can still launch but live sign-in will report missing configuration."
        - "If automatic signing fails for com.neonwatty.PRBar.ios on iPhone-prod, the next action is Apple Developer provisioning/device registration rather than script retries."
