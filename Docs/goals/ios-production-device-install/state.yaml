# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "iOS Production Device Install"
  slug: "ios-production-device-install"
  kind: specific
  tranche: "Create and verify a repeatable production-iPhone install/smoke path for the non-preview PRBar iOS app."
  status: done
  oracle:
    signal: "A repeatable install/smoke path installs the production PRBar iOS app, not PRBarPreview, on the production iPhone and reports clear success or precise blockers."
    cadence: "after each Worker package and at final audit"
    final_proof: "Workflow run URL or local device command receipt proving production device name, PRBar scheme, com.neonwatty.PRBar.ios bundle id, install result, and launch/smoke outcome."
  intake:
    original_request: "Plan out creating a different version for the production device using GoalBuddy Prep."
    interpreted_outcome: "Prepare a GoalBuddy board for adding a separate production-iPhone install and smoke path for the real PRBar iOS app."
    input_shape: specific
    audience: "PRBar maintainer and production-device release/test operator"
    authority: requested
    proof_type: test
    completion_proof: "The production iPhone receives and launches the non-preview PRBar app through a repeatable workflow or documented command."
    likely_misfire: "Reusing the preview workflow while still installing PRBarPreview or only proving build success without production phone installation."
    blind_spots_considered:
      - "Production and preview apps need separate bundle identifiers and may exist side by side."
      - "GitHub OAuth client configuration may differ between preview and production bundle/callback handling."
      - "Automatic signing may need production bundle provisioning or registered device access."
      - "The workflow must not accidentally target iPhone-preview."
      - "Production app data should not be wiped unless the user approves."
      - "Device lock, trust, and runner ownership need precise blocker messages."
    existing_plan_facts:
      - "Preview path already proved live smoke on iPhone-preview."
      - "Preview workflow uses PRBarPreview and com.neonwatty.PRBar.ios.preview."
      - "Production scheme is PRBar."
      - "Production bundle id is com.neonwatty.PRBar.ios."
      - "The production iPhone should be selected explicitly by device name or dedicated runner label."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: running
    url: "http://goalbuddy.localhost:41737/ios-production-device-install/"
    command: "npx goalbuddy board Docs/goals/ios-production-device-install"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Map the current preview install/smoke setup, production target settings, signing assumptions, and production iPhone selection options."
    inputs:
      - ".github/workflows/ios-preview-install.yml"
      - ".github/workflows/ios-physical-preview.yml"
      - "scripts/ios-preview-install.sh"
      - "scripts/ios-preview-device-smoke.sh"
      - "scripts/ios-resolve-preview-device.sh"
      - "scripts/ios-list-devices.sh"
      - "apple/PRBar.xcodeproj/project.pbxproj"
      - "apple/project.yml"
      - "apple/PRBar/Info.plist"
      - "apple/PRBarPreview-Info.plist"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Do not run a production install yet."
      - "Identify exactly where scripts are preview-specific by name, app path, bundle id, or test target."
      - "Identify whether production needs a new runner label, only a device_name input, or both."
      - "Call out signing/OAuth/device-selection blockers separately."
    expected_output:
      - "Current surface map with file-path evidence."
      - "Recommended production channel shape: workflow names, scheme, bundle id, device input, runner labels, and script parameterization."
      - "Decision points the user must approve before installing on the production phone, if any."
      - "Candidate Worker package with allowed files and verification commands."
    receipt:
      result: done
      summary: "Mapped the production-device surface. The production app target already exists as PRBar/com.neonwatty.PRBar.ios and iPhone-prod is visible to CoreDevice/Xcode on this Mac. Current automation is still preview-shaped: workflows use PRBarPreview, preview bundle id, preview runner naming, and scripts default to preview names; ios-preview-install.sh also hardcodes PRBarPreview.app, so env overrides alone cannot safely install PRBar. GitHub Actions currently exposes one repo runner named prbar-iphone-preview with labels self-hosted/macOS/ARM64/prbar-ios/iphone-preview, so the first production workflow can likely reuse that Mac runner while explicitly selecting device_name=iPhone-prod, but a dedicated iphone-prod label/runner would be cleaner later."
      evidence:
        - ".github/workflows/ios-preview-install.yml:20-31 names Build and Install Preview App, uses runner label iphone-preview, sets IOS_SCHEME=PRBarPreview, and expects com.neonwatty.PRBar.ios.preview."
        - ".github/workflows/ios-physical-preview.yml:24-40 uses runner label iphone-preview, PRBarPreview scheme/test target, preview bundle id, and preview concurrency group."
        - "scripts/ios-preview-install.sh:7-12 defaults to PRBarPreview/iPhone-preview/com.neonwatty.PRBar.ios.preview."
        - "scripts/ios-preview-install.sh:36 hardcodes app_path to PRBarPreview.app, which prevents safe production use through environment overrides alone."
        - "scripts/ios-preview-device-smoke.sh:7-14 defaults to PRBarPreview, PRBarPreviewUITests, iPhone-preview, and PreviewDeviceSmokeResults.xcresult."
        - "scripts/ios-resolve-preview-device.sh:7-10 defaults to PRBarPreview and iPhone-preview but can resolve any IOS_DEVICE_NAME/IOS_SCHEME override."
        - "scripts/ios-list-devices.sh output shows iPhone-prod available via CoreDevice as D7045658-5C05-5166-B20F-1E01DEC05DB1, model iPhone 16e."
        - "scripts/ios-list-devices.sh output shows Xcode destination for iPhone-prod as 00008140-001055D83E87001C."
        - "gh api repos/mean-weasel/prbar/actions/runners reported only prbar-iphone-preview online, labels self-hosted/macOS/ARM64/prbar-ios/iphone-preview."
        - "apple/project.yml:11-24 defines production target PRBar with PRODUCT_BUNDLE_IDENTIFIER=com.neonwatty.PRBar.ios and preview target PRBarPreview separately."
        - "apple/project.yml:63-78 defines PRBarUITests against PRBar; apple/project.yml:78-94 defines PRBarPreviewUITests against PRBarPreview."
        - "apple/PRBar/Info.plist:21-22 reads PRBarGitHubOAuthClientID from PRBAR_IOS_GITHUB_CLIENT_ID; apple/PRBarPreview-Info.plist does not include that key in the generated file shown."
        - "apple/PRBar.xcodeproj/project.pbxproj:701-718 and 721-739 confirm PRBar app build settings use PRODUCT_BUNDLE_IDENTIFIER=com.neonwatty.PRBar.ios and PRODUCT_NAME=PRBar."
      recommendation: "Implement an explicit production workflow/channel rather than mutating preview workflows in place. Prefer shared scripts with parameterized scheme, product name, bundle id, device role, result bundle, and resolver text; preserve preview wrappers for compatibility. First production run should default device_name=iPhone-prod, scheme PRBar, UI target PRBarUITests, bundle id com.neonwatty.PRBar.ios, and concurrency group ios-production-device. Reuse runs-on labels [self-hosted, macOS, prbar-ios, iphone-preview] initially because that is the only online repo runner, while making device selection explicit and documenting that a future dedicated iphone-prod label would reduce operator risk."
      decision_points:
        - "Before dispatching a production install/smoke, confirm iPhone-prod is unlocked and the user is comfortable installing/updating the production app without wiping app data."
        - "If GitHub sign-in is exercised on production, PRBAR_IOS_GITHUB_CLIENT_ID must be supplied to the production build through build settings or environment; otherwise the app can still launch but live sign-in will report missing configuration."
        - "If automatic signing fails for com.neonwatty.PRBar.ios on iPhone-prod, the next action is Apple Developer provisioning/device registration rather than script retries."
      candidate_worker:
        objective: "Create shared install/smoke scripts and production workflows that install PRBar/com.neonwatty.PRBar.ios on iPhone-prod and run a minimal PRBarUITests launch smoke, while preserving existing preview workflows as wrappers."
