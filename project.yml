name: PRMenuBar
options:
  bundleIdPrefix: com.neonwatty
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: NO
    COMBINE_HIDPI_IMAGES: YES

targets:
  PRMenuBar:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: PRMenuBar
        CFBundleDisplayName: PR Menu Bar
        CFBundleIdentifier: com.neonwatty.PRMenuBar
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Copyright 2026 Jeremy Watt"

  PRMenuBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PRMenuBarTests
    dependencies:
      - target: PRMenuBar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.neonwatty.PRMenuBarTests

schemes:
  PRMenuBar:
    build:
      targets:
        PRMenuBar: all
    test:
      gatherCoverageData: false
      targets:
        - PRMenuBarTests

