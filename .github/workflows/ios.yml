name: iOS

on:
  pull_request:
    branches: [main]
    paths:
      - apple/**
      - scripts/ios-*.sh
      - .github/workflows/ios.yml
      - package.json
      - package-lock.json
  push:
    branches: [main]
    paths:
      - apple/**
      - scripts/ios-*.sh
      - .github/workflows/ios.yml
  workflow_dispatch:
    inputs:
      smoke_profile:
        description: iOS UI smoke profile
        required: true
        default: pr
        type: choice
        options: [fast, pr, full]

concurrency:
  group: ios-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-smoke:
    name: Build, Test, UI Smoke
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Build
        run: ./scripts/ios-build.sh
      - name: Unit and UI tests
        run: ./scripts/ios-test.sh
      - name: UI smoke
        env:
          IOS_UI_SMOKE_PROFILE: ${{ inputs.smoke_profile || 'pr' }}
        run: ./scripts/ios-ui-smoke.sh
      - name: Upload iOS test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-test-results
          path: |
            apple/TestResults.xcresult
            apple/UISmokeResults.xcresult
          retention-days: 14
