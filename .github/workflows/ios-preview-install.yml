name: iOS Preview Install

on:
  workflow_dispatch:
    inputs:
      device_name:
        description: Physical iPhone name reported by Xcode
        required: true
        default: iPhone-preview

concurrency:
  group: ios-preview-device
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  install:
    name: Build and Install Preview App
    runs-on: [self-hosted, macOS, prbar-ios, iphone-preview]
    timeout-minutes: 30
    env:
      IOS_DEVICE_NAME: ${{ inputs.device_name }}
      IOS_PROJECT: apple/PRBar.xcodeproj
      IOS_SCHEME: PRBarPreview
      PRODUCT_BUNDLE_IDENTIFIER: com.neonwatty.PRBar.ios.preview
      IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
      PRBAR_IOS_GITHUB_CLIENT_ID: ${{ secrets.PRBAR_IOS_GITHUB_CLIENT_ID }}
      PRBAR_IOS_POSTHOG_HOST: ${{ secrets.PRBAR_IOS_POSTHOG_HOST }}
      PRBAR_IOS_POSTHOG_PROJECT_ID: ${{ secrets.PRBAR_IOS_POSTHOG_PROJECT_ID }}
      PRBAR_IOS_POSTHOG_PERSONAL_API_KEY: ${{ secrets.PRBAR_IOS_POSTHOG_PERSONAL_API_KEY }}
      PRBAR_IOS_POSTHOG_DASHBOARD_ID: ${{ vars.PRBAR_IOS_POSTHOG_DASHBOARD_ID }}
      IOS_XCODEBUILD_EXTRA_ARGS: -allowProvisioningUpdates -allowProvisioningDeviceRegistration
      IOS_PREVIEW_KEYCHAIN_PASSWORD: ${{ secrets.IOS_PREVIEW_KEYCHAIN_PASSWORD }}
      IOS_PREVIEW_SET_KEY_PARTITION_LIST: '1'
    steps:
      - uses: actions/checkout@v6
      - name: Runner preflight
        run: ./scripts/ios-preview-runner-preflight.sh
      - name: List devices
        if: always()
        run: ./scripts/ios-list-devices.sh
      - name: Build and install preview app
        run: ./scripts/ios-preview-install.sh
