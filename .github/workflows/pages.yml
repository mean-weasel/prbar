name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - assets/**
      - Docs/Marketing.md
      - index.html
      - mockups/web/**
      - pr-chart-mobile.html
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Prepare site
        run: |
          mkdir _site
          cp -R assets _site/
          mkdir -p _site/Docs
          cp Docs/Marketing.md _site/Docs/Marketing.md
          cp pr-chart-mobile.html _site/index.html
          cp pr-chart-mobile.html _site/pr-chart-mobile.html
          mkdir -p _site/web
          cp -R mockups/web/. _site/web/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
