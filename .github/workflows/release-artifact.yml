name: Release Artifact

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to package, for example v1.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-artifact-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  macos-app:
    name: Build, notarize, and upload macOS app
    runs-on: macos-15
    timeout-minutes: 45
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
      ARTIFACT_NAME: PRMenuBar-macOS.zip
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      PRBAR_SIGNING_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION }}
      PRBAR_REQUIRE_NOTARIZATION: "1"
    steps:
      - name: Checkout release source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          path: source

      - name: Checkout packaging tooling
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEFAULT_BRANCH }}
          path: tools

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$MACOS_CERTIFICATE_P12_BASE64" || { echo "MACOS_CERTIFICATE_P12_BASE64 is required"; exit 1; }
          test -n "$MACOS_CERTIFICATE_PASSWORD" || { echo "MACOS_CERTIFICATE_PASSWORD is required"; exit 1; }
          test -n "$MACOS_KEYCHAIN_PASSWORD" || { echo "MACOS_KEYCHAIN_PASSWORD is required"; exit 1; }
          test -n "$PRBAR_SIGNING_IDENTITY" || { echo "MACOS_DEVELOPER_ID_APPLICATION is required"; exit 1; }

          CERTIFICATE_PATH="$RUNNER_TEMP/prbar-developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/prbar-signing.keychain-db"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s \
            -k "$MACOS_KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Package notarized app
        run: |
          ROOT_DIR="$GITHUB_WORKSPACE/source" \
            "$GITHUB_WORKSPACE/tools/scripts/package-macos-release.sh"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: PRMenuBar-macOS
          path: |
            source/dist/PRMenuBar-macOS.zip
            source/dist/PRMenuBar-macOS.zip.sha256
            source/dist/codesign.txt
          retention-days: 30

      - name: Upload asset to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            source/dist/PRMenuBar-macOS.zip \
            source/dist/PRMenuBar-macOS.zip.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
