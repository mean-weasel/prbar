name: iOS Physical Preview

on:
  workflow_dispatch:
    inputs:
      smoke_profile:
        description: iOS UI smoke profile
        required: true
        default: pr
        type: choice
        options: [fast, pr, full, live, live-headless]
      device_name:
        description: Physical iPhone name reported by Xcode
        required: true
        default: iPhone-preview
      github_login:
        description: GitHub login expected for live smoke
        required: false
        default: neonwatty
      included_repo:
        description: Single owner/repo to include for live smoke
        required: false
        default: mean-weasel/prbar

concurrency:
  group: ios-preview-device
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  device-smoke:
    name: Physical Device Smoke
    runs-on: [self-hosted, macOS, prbar-ios, iphone-preview]
    timeout-minutes: 30
    env:
      IOS_DEVICE_NAME: ${{ inputs.device_name }}
      IOS_PROJECT: apple/PRBar.xcodeproj
      IOS_SCHEME: PRBarPreview
      IOS_UI_SCHEME: PRBarPreview
      IOS_UI_TEST_TARGET: PRBarPreviewUITests
      PRODUCT_BUNDLE_IDENTIFIER: com.neonwatty.PRBar.ios.preview
      IOS_UI_SMOKE_PROFILE: ${{ inputs.smoke_profile }}
      IOS_LIVE_GITHUB_LOGIN: ${{ inputs.github_login }}
      IOS_LIVE_INCLUDED_REPO: ${{ inputs.included_repo }}
      PRBAR_IOS_LIVE_GITHUB_TOKEN: ${{ secrets.PRBAR_IOS_LIVE_GITHUB_TOKEN }}
      IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
      PRBAR_IOS_GITHUB_CLIENT_ID: ${{ secrets.PRBAR_IOS_GITHUB_CLIENT_ID }}
      IOS_XCODEBUILD_EXTRA_ARGS: -allowProvisioningUpdates -allowProvisioningDeviceRegistration
      IOS_PREVIEW_KEYCHAIN_PASSWORD: ${{ secrets.IOS_PREVIEW_KEYCHAIN_PASSWORD }}
      IOS_PREVIEW_SET_KEY_PARTITION_LIST: '1'
    steps:
      - uses: actions/checkout@v6
      - name: Runner preflight
        run: ./scripts/ios-preview-runner-preflight.sh
      - name: List devices
        if: always()
        run: ./scripts/ios-list-devices.sh
      - name: Resolve preview device
        run: ./scripts/ios-resolve-preview-device.sh
      - name: Run physical device smoke
        run: ./scripts/ios-preview-device-smoke.sh
      - name: Upload preview smoke results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-preview-device-smoke-results
          path: apple/PreviewDeviceSmokeResults.xcresult
          retention-days: 14
