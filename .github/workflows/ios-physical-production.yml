name: iOS Physical Production

on:
  workflow_dispatch:
    inputs:
      smoke_profile:
        description: iOS UI smoke profile
        required: true
        default: fast
        type: choice
        options: [fast, pr, version, setup, partial, full, live, production]
      device_name:
        description: Production iPhone name reported by Xcode
        required: true
        default: iPhone-prod
      live_repository:
        description: owner/repo to select during live GitHub setup smoke
        required: true
        default: mean-weasel/prbar

concurrency:
  group: ios-production-device
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  device-smoke:
    name: Physical Production Device Smoke
    runs-on: [self-hosted, macOS, prbar-ios, iphone-preview]
    timeout-minutes: 30
    env:
      IOS_DEVICE_NAME: ${{ inputs.device_name }}
      IOS_DEVICE_ROLE: production device
      IOS_PROJECT: apple/PRBar.xcodeproj
      IOS_SCHEME: PRBar
      IOS_UI_SCHEME: PRBar
      IOS_UI_TEST_TARGET: PRBarUITests
      IOS_UI_SMOKE_TESTS: PRBarUITests/PRBarUITests/testTabsExposeReviewedPrototypeSurfaces
      PRODUCT_BUNDLE_IDENTIFIER: com.neonwatty.PRBar.ios
      IOS_UI_SMOKE_PROFILE: ${{ inputs.smoke_profile }}
      IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
      PRBAR_IOS_GITHUB_CLIENT_ID: ${{ secrets.PRBAR_IOS_GITHUB_CLIENT_ID }}
      PRBAR_IOS_LIVE_GITHUB_TOKEN: ${{ secrets.PRBAR_IOS_LIVE_GITHUB_TOKEN }}
      PRBAR_IOS_LIVE_REPOSITORY: ${{ inputs.live_repository }}
      IOS_XCODEBUILD_EXTRA_ARGS: -allowProvisioningUpdates -allowProvisioningDeviceRegistration
      IOS_PREVIEW_KEYCHAIN_PASSWORD: ${{ secrets.IOS_PREVIEW_KEYCHAIN_PASSWORD }}
      IOS_PREVIEW_SET_KEY_PARTITION_LIST: '1'
    steps:
      - uses: actions/checkout@v6
      - name: Runner preflight
        run: ./scripts/ios-production-runner-preflight.sh
      - name: List devices
        if: always()
        run: ./scripts/ios-list-devices.sh
      - name: Resolve production device
        run: IOS_DEVICE_ROLE="production device" IOS_DEVICE_NAME="${{ inputs.device_name }}" IOS_SCHEME=PRBar ./scripts/ios-resolve-device.sh human
      - name: Run physical production device smoke
        run: ./scripts/ios-production-device-smoke.sh
      - name: Upload production smoke results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-production-device-smoke-results
          path: apple/ProductionDeviceSmokeResults.xcresult
          retention-days: 14
